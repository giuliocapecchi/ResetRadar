# ResetRadar configuration - watched accounts and X mirrors.
# Editing this file is the supported way to add/remove watched sources.

[accounts]
# Official X handles -> platform. Only these accounts mint events.
claudedevs   = "claude"   # @ClaudeDevs  - posted the cited "reset everyone's limits"
anthropicai  = "claude"   # @AnthropicAI
claudeai     = "claude"   # @ClaudeAI
openaidevs   = "codex"    # @OpenAIDevs
openai       = "codex"    # @OpenAI
sama         = "codex"    # @sama (Sam Altman)
gdb          = "codex"    # @gdb (Greg Brockman)
thsottiaux   = "codex"    # @thsottiaux (Thibault Sottiaux, Codex)
embirico     = "codex"    # @embirico (Codex, OpenAI)
bcherny      = "claude"   # @bcherny (Boris Cherny, Claude Code)
trq212       = "claude"   # @trq212 (Thariq, Anthropic)
_catwu       = "claude"   # @_catwu (Cat Wu, Anthropic)

[nitter]
# Primary X reader: free, no auth. Mirrors each official account's timeline as
# RSS, which gives us discovery of new posts. Instances are flaky, so list a few
# - the adapter uses the first that returns items.
enabled = true
instances = [
    "nitter.net",
    "xcancel.com",
    "nitter.tiekoetter.com",
    "nitter.poast.org",
]

[backfill]
